<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🦄 Unicorn Dash</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:100%; height:100%;
    background:#0d0015;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; touch-action:none;
    font-family:'Nunito',sans-serif;
  }

  /* The wrapper scales via JS transform */
  #wrapper {
    position:relative;
    width:800px; height:420px;
    transform-origin: center center;
    flex-shrink:0;
  }

  canvas {
    display:block; border-radius:20px;
    box-shadow: 0 0 60px #ff6ef780, 0 0 120px #7c3aed40;
    cursor:pointer; user-select:none;
    -webkit-tap-highlight-color: transparent;
  }

  /* HUD */
  #ui {
    position:absolute; top:0; left:0; right:0;
    padding:18px 24px; display:flex; justify-content:space-between;
    align-items:flex-start; pointer-events:none;
  }
  .score-box {
    background:rgba(255,255,255,0.12); backdrop-filter:blur(10px);
    border:1.5px solid rgba(255,255,255,0.25); border-radius:12px;
    padding:6px 18px; color:white;
    font-family:'Fredoka One',cursive; font-size:22px;
    text-shadow:0 0 10px #ff6ef7;
  }
  .score-box span {
    font-size:13px; opacity:0.7; display:block;
    font-family:'Nunito',sans-serif; font-weight:700;
    text-transform:uppercase; letter-spacing:1px;
  }

  /* OVERLAYS */
  .overlay {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; border-radius:20px;
    background:rgba(10,0,20,0.84); backdrop-filter:blur(6px);
    transition:opacity 0.25s; overflow:hidden; padding:12px;
  }
  .overlay.hidden { opacity:0; pointer-events:none; }

  /* TITLE */
  #titleOverlay h1 {
    font-family:'Fredoka One',cursive; font-size:clamp(32px,6.5vw,52px);
    background:linear-gradient(135deg,#ff6ef7,#a78bfa,#60a5fa);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 20px #ff6ef7aa); margin-bottom:6px;
    text-align:center;
  }
  #titleOverlay p {
    color:rgba(255,255,255,0.7); font-size:clamp(12px,1.8vw,15px);
    font-weight:700; margin-bottom:20px; text-align:center;
  }

  /* SELECT */
  #selectOverlay h2 {
    font-family:'Fredoka One',cursive; font-size:clamp(18px,3.5vw,28px);
    color:#f0abfc; text-shadow:0 0 14px #e879f9aa;
    margin-bottom:10px; text-align:center;
  }
  #unicornGrid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px; margin-bottom:12px;
    width:100%; max-width:460px;
  }
  .uni-card {
    background:rgba(255,255,255,0.07);
    border:2px solid rgba(255,255,255,0.12); border-radius:12px;
    padding:6px 4px; text-align:center; cursor:pointer;
    transition:transform 0.15s, border-color 0.2s, box-shadow 0.2s;
    pointer-events:all;
  }
  .uni-card:hover  { transform:scale(1.05); border-color:rgba(255,255,255,0.35); }
  .uni-card.selected { border-color:#f0abfc; box-shadow:0 0 18px #e879f990; transform:scale(1.07); }
  .uni-card canvas { border-radius:6px; display:block; margin:0 auto 4px; width:100% !important; height:auto !important; }
  .uni-card .uni-name { color:white; font-family:'Fredoka One',cursive; font-size:clamp(10px,1.5vw,13px); }
  .uni-card .uni-trait { color:rgba(255,255,255,0.45); font-size:clamp(8px,1.1vw,10px); font-weight:700; text-transform:uppercase; letter-spacing:0.4px; margin-top:1px; }

  /* GAMEOVER */
  #gameoverOverlay h2 {
    font-family:'Fredoka One',cursive; font-size:clamp(28px,5vw,42px);
    color:#ff6ef7; text-shadow:0 0 20px #ff6ef7aa; margin-bottom:4px;
    text-align:center;
  }
  .final-score {
    font-family:'Fredoka One',cursive; font-size:clamp(16px,2.8vw,24px);
    color:#ffd700; text-shadow:0 0 12px #ffd70088; margin-bottom:14px;
    text-align:center;
  }
  #gameoverOverlay p {
    color:rgba(255,255,255,0.65); font-size:clamp(11px,1.6vw,14px);
    font-weight:700; margin-bottom:14px; text-align:center;
  }

  /* BUTTONS */
  .btn {
    background:linear-gradient(135deg,#ff6ef7,#7c3aed); border:none;
    color:white; font-family:'Fredoka One',cursive;
    font-size:clamp(14px,2.2vw,20px);
    padding:clamp(8px,1.5vw,12px) clamp(20px,4vw,38px);
    border-radius:50px; cursor:pointer;
    box-shadow:0 0 28px #ff6ef7aa;
    transition:transform 0.15s, box-shadow 0.15s;
    pointer-events:all; margin:4px;
    -webkit-tap-highlight-color:transparent;
  }
  .btn:active { transform:scale(0.96); }
  .btn:hover  { transform:scale(1.06); box-shadow:0 0 46px #ff6ef7cc; }
  .btn.sec {
    background:rgba(255,255,255,0.10); box-shadow:none;
    font-size:clamp(12px,1.8vw,16px);
    padding:clamp(6px,1.2vw,10px) clamp(16px,3vw,26px);
  }
  .btn.sec:hover { background:rgba(255,255,255,0.18); box-shadow:none; }

  /* HINT */
  #hint {
    position:absolute; bottom:10px; left:50%; transform:translateX(-50%);
    color:rgba(255,255,255,0.30); font-size:clamp(9px,1.3vw,12px);
    pointer-events:none; white-space:nowrap;
  }

  /* Mobile jump button — shown only on touch devices */
  #jumpBtn {
    display:none;
    position:absolute; bottom:16px; right:16px;
    width:64px; height:64px; border-radius:50%;
    background:linear-gradient(135deg,#ff6ef7aa,#7c3aedaa);
    border:2px solid rgba(255,255,255,0.3);
    color:white; font-size:28px; line-height:64px; text-align:center;
    cursor:pointer; pointer-events:all;
    box-shadow:0 0 20px #ff6ef760;
    user-select:none; -webkit-tap-highlight-color:transparent;
    transition: transform 0.1s;
  }
  #jumpBtn:active { transform:scale(0.88); }
  @media (hover: none) and (pointer: coarse) {
    #jumpBtn { display:block; }
    #hint { display:none; }
  }
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="canvas" width="800" height="420"></canvas>

  <div id="ui">
    <div class="score-box"><span>Score</span><span id="scoreDisplay">0</span></div>
    <div class="score-box"><span>Best</span><span id="bestDisplay">0</span></div>
  </div>

  <!-- TITLE -->
  <div class="overlay" id="titleOverlay">
    <h1>🦄 Unicorn Dash</h1>
    <p>Run. Jump. Sparkle. Survive.</p>
    <button class="btn" id="chooseBtn">CHOOSE YOUR UNICORN</button>
  </div>

  <!-- CHARACTER SELECT -->
  <div class="overlay hidden" id="selectOverlay">
    <h2>✨ Pick Your Unicorn ✨</h2>
    <div id="unicornGrid"></div>
    <button class="btn" id="startBtn">LET'S DASH!</button>
  </div>

  <!-- GAME OVER -->
  <div class="overlay hidden" id="gameoverOverlay">
    <h2>💥 Game Over!</h2>
    <p id="goSubtext">So close!</p>
    <div class="final-score" id="finalScore"></div>
    <div style="display:flex;flex-wrap:wrap;justify-content:center">
      <button class="btn" id="replayBtn">PLAY AGAIN</button>
      <button class="btn sec" id="changeBtn">CHANGE UNICORN</button>
    </div>
  </div>

  <div id="hint">SPACE / TAP to jump &nbsp;•&nbsp; Double jump!</div>
  <div id="jumpBtn">↑</div>
</div>

<script>
// ── RESPONSIVE SCALING ───────────────────────────────────────────
const GAME_W = 800, GAME_H = 420;
function scaleWrapper() {
  const wrapper = document.getElementById('wrapper');
  const scaleX = window.innerWidth  / GAME_W;
  const scaleY = window.innerHeight / GAME_H;
  const scale  = Math.min(scaleX, scaleY) * 0.97;
  wrapper.style.transform = `scale(${scale})`;
  wrapper.style.marginTop = `${(window.innerHeight - GAME_H * scale) / 2}px`;
}
scaleWrapper();
window.addEventListener('resize', scaleWrapper);
window.addEventListener('orientationchange', () => setTimeout(scaleWrapper, 200));

// ── UNICORN ROSTER ───────────────────────────────────────────────
const UNICORNS = [
  {
    id:0, name:'Cotton Candy', emoji:'🍬', trait:'Classic Charmer',
    body:['#fae8ff','#f5d0fe','#e879f9'], outline:'#d946ef',
    mane:['#f472b6','#a78bfa','#60a5fa','#34d399'],
    tail:['#f472b6','#a78bfa'], hoof:'#e879f9', leg:'#f0abfc',
    horn:['#fbbf24','#fef3c7'], hornGlow:'#fbbf24',
    wing:'rgba(216,180,254,0.6)', wingStroke:'rgba(192,132,252,0.8)',
    glow:'rgba(255,110,247,0.25)', trailHue:280, sparkleRange:[260,60]
  },
  {
    id:1, name:'Ocean Breeze', emoji:'🌊', trait:'Swift & Serene',
    body:['#e0f2fe','#bae6fd','#38bdf8'], outline:'#0284c7',

    tail:['#38bdf8','#06b6d4'], hoof:'#0ea5e9', leg:'#7dd3fc',
    horn:['#f0f9ff','#bae6fd'], hornGlow:'#7dd3fc',
    wing:'rgba(147,210,254,0.6)', wingStroke:'rgba(56,189,248,0.8)',

  },
  {

    tail:['#7c3aed','#818cf8'], hoof:'#8b5cf6', leg:'#c4b5fd',
    horn:['#e0e0ff','#ffffff'], hornGlow:'#a78bfa',
    wing:'rgba(167,139,250,0.55)', wingStroke:'rgba(124,58,237,0.8)',

    tail:['#f59e0b','#ef4444'], hoof:'#f97316', leg:'#fcd34d',
    horn:['#ffffff','#fef9c3'], hornGlow:'#fbbf24',
    wing:'rgba(251,191,36,0.55)', wingStroke:'rgba(245,158,11,0.85)',
    glow:'rgba(251,146,60,0.28)', trailHue:35, sparkleRange:[15,50]
  },
  {
    id:4, name:'Forest Sprite', emoji:'🌿', trait:'Earthy & Graceful',
    body:['#d1fae5','#a7f3d0','#34d399'], outline:'#059669',
    mane:['#10b981','#34d399','#86efac','#6ee7b7'],
    tail:['#34d399','#059669'], hoof:'#10b981', leg:'#6ee7b7',
    horn:['#d1fae5','#ffffff'], hornGlow:'#34d399',
    wing:'rgba(110,231,183,0.55)', wingStroke:'rgba(52,211,153,0.85)',
    glow:'rgba(52,211,153,0.22)', trailHue:150, sparkleRange:[130,45]
  },
  {
    id:5, name:'Frost Queen', emoji:'❄️', trait:'Ice Cold Legend',
    body:['#f0f9ff','#e0f2fe','#7dd3fc'], outline:'#0ea5e9',
    mane:['#bae6fd','#e0f2fe','#ffffff','#93c5fd'],
    tail:['#bae6fd','#ffffff'], hoof:'#7dd3fc', leg:'#e0f2fe',
    horn:['#ffffff','#e0f2fe'], hornGlow:'#e0f2fe',
    wing:'rgba(224,242,254,0.65)', wingStroke:'rgba(186,230,253,0.9)',
    glow:'rgba(186,230,253,0.25)', trailHue:205, sparkleRange:[195,25]
  }
];
let selectedUni = UNICORNS[0];

// ── PREVIEW RENDERER ─────────────────────────────────────────────
function renderUniPreview(pctx, uni, cx, cy, t) {
  pctx.save();
  pctx.translate(cx, cy);
  pctx.scale(0.68, 0.68);
  t = t || 0;

  const glow = pctx.createRadialGradient(0,0,4,0,0,40);
  glow.addColorStop(0,uni.glow); glow.addColorStop(1,'rgba(0,0,0,0)');
  pctx.fillStyle=glow; pctx.beginPath(); pctx.arc(0,0,40,0,Math.PI*2); pctx.fill();

  [[-14,16,Math.sin(t)*10,20],[0,16,Math.sin(t+0.8)*10,20],[-8,18,Math.sin(t+1.5)*8,20],[8,18,Math.sin(t+2.3)*8,20]].forEach(([lx,ly,sw,len])=>{
    pctx.beginPath();pctx.moveTo(lx,ly);pctx.lineTo(lx+sw,ly+len);
    pctx.strokeStyle=uni.leg;pctx.lineWidth=5;pctx.lineCap='round';pctx.stroke();
    pctx.beginPath();pctx.arc(lx+sw,ly+len,4,0,Math.PI*2);pctx.fillStyle=uni.hoof;pctx.fill();
  });

  pctx.beginPath();pctx.ellipse(0,4,26,16,0,0,Math.PI*2);
  const bg=pctx.createLinearGradient(-26,-12,26,20);
  bg.addColorStop(0,uni.body[0]);bg.addColorStop(0.5,uni.body[1]);bg.addColorStop(1,uni.body[2]);
  pctx.fillStyle=bg;pctx.fill();pctx.strokeStyle=uni.outline;pctx.lineWidth=1.5;pctx.stroke();

  pctx.beginPath();pctx.ellipse(16,-6,10,14,0.3,0,Math.PI*2);
  pctx.fillStyle=uni.body[0];pctx.fill();pctx.strokeStyle=uni.outline;pctx.lineWidth=1.5;pctx.stroke();

  pctx.beginPath();pctx.ellipse(24,-14,13,10,-0.2,0,Math.PI*2);
  pctx.fillStyle=uni.body[0];pctx.fill();pctx.strokeStyle=uni.outline;pctx.lineWidth=1.5;pctx.stroke();

  pctx.save();pctx.translate(32,-22);pctx.rotate(-0.3);
  const hg=pctx.createLinearGradient(0,0,0,-22);
  hg.addColorStop(0,uni.horn[0]);hg.addColorStop(1,uni.horn[1]);
  pctx.beginPath();pctx.moveTo(-4,0);pctx.lineTo(4,0);pctx.lineTo(0,-22);pctx.closePath();
  pctx.fillStyle=hg;pctx.shadowColor=uni.hornGlow;pctx.shadowBlur=8;pctx.fill();pctx.restore();

  pctx.beginPath();pctx.arc(29,-15,4,0,Math.PI*2);pctx.fillStyle='#1e1b4b';pctx.fill();
  pctx.beginPath();pctx.arc(30,-16,1.5,0,Math.PI*2);pctx.fillStyle='white';pctx.fill();

  pctx.beginPath();pctx.moveTo(20,-22);pctx.lineTo(17,-30);pctx.lineTo(24,-24);pctx.closePath();
  pctx.fillStyle=uni.body[1];pctx.fill();

  for(let i=0;i<6;i++){
    pctx.beginPath();pctx.arc(18-i*2.5,-18+Math.sin(i*1.2+t*0.8)*3,4-i*0.3,0,Math.PI*2);
    pctx.fillStyle=uni.mane[i%uni.mane.length];pctx.globalAlpha=0.88;pctx.fill();pctx.globalAlpha=1;
  }

  pctx.save();pctx.translate(-4,0);pctx.rotate(Math.sin(t*0.8)*0.3);
  pctx.beginPath();pctx.moveTo(0,0);pctx.quadraticCurveTo(-20,-25,-35,-10);pctx.quadraticCurveTo(-15,5,0,0);
  pctx.fillStyle=uni.wing;pctx.fill();pctx.strokeStyle=uni.wingStroke;pctx.lineWidth=1;pctx.stroke();pctx.restore();

  const tw=Math.sin(t*0.8);
  pctx.beginPath();pctx.moveTo(-24,4);pctx.quadraticCurveTo(-38+tw*5,-5,-45,8+tw*8);
  pctx.strokeStyle=uni.tail[0];pctx.lineWidth=6;pctx.lineCap='round';pctx.stroke();
  pctx.beginPath();pctx.moveTo(-24,4);pctx.quadraticCurveTo(-36+tw*5,0,-44,14+tw*8);
  pctx.strokeStyle=uni.tail[1];pctx.lineWidth=4;pctx.stroke();

  pctx.restore();
}

let previewAnimT = 0;
let previewCanvases = [];
let previewRunning = false;

function buildSelectGrid() {
  const grid = document.getElementById('unicornGrid');
  grid.innerHTML = '';
  previewCanvases = [];

  UNICORNS.forEach(uni => {
    const card = document.createElement('div');
    card.className = 'uni-card' + (uni.id===selectedUni.id?' selected':'');
    card.dataset.id = uni.id;

    const pc = document.createElement('canvas');
    pc.width = 100; pc.height = 72;
    pc.style.width = '100%'; pc.style.height = 'auto';
    previewCanvases.push({canvas:pc, uni});

    const nm = document.createElement('div'); nm.className='uni-name'; nm.textContent=uni.emoji+' '+uni.name;
    const tr = document.createElement('div'); tr.className='uni-trait'; tr.textContent=uni.trait;

    card.appendChild(pc); card.appendChild(nm); card.appendChild(tr);
    card.addEventListener('pointerdown', e => { e.stopPropagation();
      selectedUni = uni;
      document.querySelectorAll('.uni-card').forEach(c=>c.classList.toggle('selected',+c.dataset.id===uni.id));
    });
    grid.appendChild(card);
  });

  if (!previewRunning) { previewRunning = true; animatePreviews(); }
}

function animatePreviews() {
  if (previewCanvases.length === 0) { previewRunning = false; return; }
  previewAnimT += 0.05;
  previewCanvases.forEach(({canvas, uni}) => {
    const pctx = canvas.getContext('2d');
    pctx.clearRect(0,0,canvas.width,canvas.height);
    pctx.fillStyle='rgba(8,0,16,0.7)';
    pctx.beginPath(); pctx.roundRect(0,0,canvas.width,canvas.height,7); pctx.fill();
    renderUniPreview(pctx, uni, 50, 48, previewAnimT);
  });
  requestAnimationFrame(animatePreviews);
}

// ── GAME ENGINE ──────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = GAME_W, H = GAME_H;
const GROUND_Y = H - 90;

let gameState = 'title';
let score=0, best=0, frame=0;
let speed=3, speedInc=0.0005;

const UNI = {x:120,y:0,vy:0,w:64,h:56,grounded:false,jumps:0,maxJumps:2,legAnim:0,trail:[],sparkles:[]};
let obstacles=[],obsCooldown=0,bgStars=[],clouds=[],groundDeco=[],particles=[];

function init() {
  UNI.y=GROUND_Y-UNI.h;UNI.vy=0;UNI.grounded=true;UNI.jumps=0;UNI.trail=[];UNI.sparkles=[];
  obstacles=[];particles=[];obsCooldown=100;score=0;frame=0;speed=3;
  bgStars=Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*(H-150),r:Math.random()*1.5+0.3,twinkle:Math.random()*Math.PI*2}));
  clouds=Array.from({length:5},(_,i)=>({x:100+i*160,y:30+Math.random()*80,w:80+Math.random()*60,h:30+Math.random()*20,spd:0.4+Math.random()*0.3}));
  groundDeco=Array.from({length:12},(_,i)=>({x:i*70,type:Math.floor(Math.random()*3)}));
}

function jump() {
  if (gameState!=='playing') return;
  if (UNI.jumps<UNI.maxJumps) {
    UNI.vy=-13;UNI.jumps++;UNI.grounded=false;
    const [hBase,hRange]=selectedUni.sparkleRange;
    for(let i=0;i<12;i++) particles.push({x:UNI.x+UNI.w/2,y:UNI.y+UNI.h,vx:(Math.random()-0.5)*4,vy:Math.random()*2+1,life:1,decay:0.05,size:Math.random()*5+2,color:`hsl(${hBase+Math.random()*hRange},100%,70%)`});
  }
}

function spawnObstacle(){
  const shapes=[{w:32,h:55},{w:24,h:70},{w:40,h:40},{w:28,h:90}];
  const colors=['#e879f9','#f472b6','#a78bfa','#fb7185','#60a5fa','#34d399','#fbbf24'];
  const s=shapes[Math.floor(Math.random()*shapes.length)];
  obstacles.push({x:W+10,y:GROUND_Y-s.h+5,w:s.w,h:s.h,color:colors[Math.floor(Math.random()*colors.length)]});
}

function hit(u,o){const p=8;return u.x+p<o.x+o.w&&u.x+u.w-p>o.x&&u.y+p<o.y+o.h&&u.y+u.h-p>o.y;}

function update(){
  if(gameState!=='playing') return;
  frame++;score=Math.floor(frame/6);speed=Math.min(speed+speedInc,14);

  UNI.vy+=0.6;UNI.y+=UNI.vy;
  if(UNI.y>=GROUND_Y-UNI.h){UNI.y=GROUND_Y-UNI.h;UNI.vy=0;UNI.grounded=true;UNI.jumps=0;}
  UNI.legAnim+=UNI.grounded?0.25:0.1;

  UNI.trail.unshift({x:UNI.x+UNI.w/2,y:UNI.y+UNI.h/2});
  if(UNI.trail.length>14) UNI.trail.pop();

  if(frame%4===0){
    const [hBase,hRange]=selectedUni.sparkleRange;
    UNI.sparkles.push({x:UNI.x+UNI.w-4,y:UNI.y+6,vx:(Math.random()-0.3)*2+speed*0.3,vy:(Math.random()-0.5)*2,life:1,decay:0.08,size:Math.random()*3+1,hue:hBase+Math.random()*hRange});
  }
  UNI.sparkles=UNI.sparkles.filter(s=>{s.x+=s.vx;s.y+=s.vy;s.life-=s.decay;return s.life>0;});

  obsCooldown--;
  if(obsCooldown<=0){spawnObstacle();const minGap=Math.max(60,130-speed*5);obsCooldown=minGap+Math.random()*50;}
  for(let o of obstacles) o.x-=speed;
  obstacles=obstacles.filter(o=>o.x+o.w>0);

  for(let o of obstacles){
    if(hit(UNI,o)){
      gameState='dead';if(score>best)best=score;
      for(let i=0;i<30;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*6+2;particles.push({x:UNI.x+UNI.w/2,y:UNI.y+UNI.h/2,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:1,decay:0.025,size:Math.random()*8+3,color:`hsl(${Math.random()*360},100%,70%)`});}
      showGameOver();return;
    }
  }

  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=p.decay;});
  particles=particles.filter(p=>p.life>0);
  clouds.forEach(c=>{c.x-=c.spd;if(c.x+c.w<0){c.x=W+20;c.y=30+Math.random()*80;}});
  groundDeco.forEach(d=>{d.x-=speed;if(d.x+20<0)d.x=W+Math.random()*50;});
  bgStars.forEach(s=>s.twinkle+=0.04);
  document.getElementById('scoreDisplay').textContent=score;
  document.getElementById('bestDisplay').textContent=best;
}

// ── DRAW ─────────────────────────────────────────────────────────
function drawBg(){
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0d0020');sky.addColorStop(0.6,'#1a0035');sky.addColorStop(1,'#2d0a4e');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  bgStars.forEach(s=>{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${0.4+0.5*Math.sin(s.twinkle)})`;ctx.fill();});

  ctx.save();ctx.beginPath();ctx.arc(700,55,30,0,Math.PI*2);
  const mg=ctx.createRadialGradient(695,50,5,700,55,30);mg.addColorStop(0,'#fff8e7');mg.addColorStop(1,'#fcd34d');
  ctx.fillStyle=mg;ctx.shadowColor='#fcd34d';ctx.shadowBlur=30;ctx.fill();ctx.restore();

  clouds.forEach(c=>{ctx.beginPath();ctx.ellipse(c.x+c.w/2,c.y+c.h/2,c.w/2,c.h/2,0,0,Math.PI*2);ctx.fillStyle='rgba(200,150,255,0.09)';ctx.fill();});

  const gg=ctx.createLinearGradient(0,GROUND_Y,0,H);
  gg.addColorStop(0,'#3b0764');gg.addColorStop(0.3,'#1e0336');gg.addColorStop(1,'#0d0015');
  ctx.fillStyle=gg;ctx.fillRect(0,GROUND_Y,W,H-GROUND_Y);

  ctx.save();ctx.beginPath();ctx.moveTo(0,GROUND_Y);ctx.lineTo(W,GROUND_Y);
  ctx.strokeStyle='#a855f7';ctx.lineWidth=2.5;ctx.shadowColor='#a855f7';ctx.shadowBlur=14;ctx.stroke();ctx.restore();

  const dc=['#c084fc','#e879f9','#818cf8'];
  groundDeco.forEach(d=>{
    ctx.save();ctx.fillStyle=dc[d.type];ctx.shadowColor=dc[d.type];ctx.shadowBlur=6;
    if(d.type===0){ctx.fillRect(d.x+6,GROUND_Y+4,8,12);ctx.beginPath();ctx.arc(d.x+10,GROUND_Y+4,11,Math.PI,0);ctx.fill();}
    else if(d.type===1){ctx.beginPath();ctx.moveTo(d.x+8,GROUND_Y+2);ctx.lineTo(d.x+3,GROUND_Y+14);ctx.lineTo(d.x+13,GROUND_Y+14);ctx.closePath();ctx.fill();}
    else{const cx=d.x+8,cy=GROUND_Y+8;for(let i=0;i<5;i++){const a=i*4*Math.PI/5-Math.PI/2,a2=a+Math.PI/5;ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*9,cy+Math.sin(a)*9);ctx.lineTo(cx+Math.cos(a2)*4,cy+Math.sin(a2)*4);ctx.lineTo(cx+Math.cos(a+Math.PI*4/5)*9,cy+Math.sin(a+Math.PI*4/5)*9);ctx.fill();}}
    ctx.restore();
  });
}

function drawTrail(){
  const u=selectedUni;
  UNI.trail.forEach((t,i)=>{
    ctx.beginPath();ctx.arc(t.x,t.y,(1-i/UNI.trail.length)*18,0,Math.PI*2);
    ctx.fillStyle=`hsla(${u.trailHue+i*3},100%,75%,${(1-i/UNI.trail.length)*0.35})`;ctx.fill();
  });
}

function drawMainUnicorn(){
  const uni=selectedUni,x=UNI.x,y=UNI.y,t=UNI.legAnim;
  ctx.save();ctx.translate(x+UNI.w/2,y+UNI.h/2);

  const glow=ctx.createRadialGradient(0,0,5,0,0,40);
  glow.addColorStop(0,uni.glow);glow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=glow;ctx.beginPath();ctx.arc(0,0,40,0,Math.PI*2);ctx.fill();

  [[-14,16,Math.sin(t)*12,20],[0,16,Math.sin(t+0.8)*12,20],[-8,18,Math.sin(t+1.5)*10,20],[8,18,Math.sin(t+2.3)*10,20]].forEach(([lx,ly,sw,len])=>{
    ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx+sw,ly+len);ctx.strokeStyle=uni.leg;ctx.lineWidth=5;ctx.lineCap='round';ctx.stroke();
    ctx.beginPath();ctx.arc(lx+sw,ly+len,4,0,Math.PI*2);ctx.fillStyle=uni.hoof;ctx.fill();
  });

  ctx.beginPath();ctx.ellipse(0,4,26,16,0,0,Math.PI*2);
  const bg=ctx.createLinearGradient(-26,-12,26,20);bg.addColorStop(0,uni.body[0]);bg.addColorStop(0.5,uni.body[1]);bg.addColorStop(1,uni.body[2]);
  ctx.fillStyle=bg;ctx.fill();ctx.strokeStyle=uni.outline;ctx.lineWidth=1.5;ctx.stroke();

  ctx.beginPath();ctx.ellipse(16,-6,10,14,0.3,0,Math.PI*2);ctx.fillStyle=uni.body[0];ctx.fill();ctx.strokeStyle=uni.outline;ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.ellipse(24,-14,13,10,-0.2,0,Math.PI*2);ctx.fillStyle=uni.body[0];ctx.fill();ctx.strokeStyle=uni.outline;ctx.lineWidth=1.5;ctx.stroke();

  ctx.save();ctx.translate(32,-22);ctx.rotate(-0.3);
  const hg=ctx.createLinearGradient(0,0,0,-22);hg.addColorStop(0,uni.horn[0]);hg.addColorStop(1,uni.horn[1]);
  ctx.beginPath();ctx.moveTo(-4,0);ctx.lineTo(4,0);ctx.lineTo(0,-22);ctx.closePath();
  ctx.fillStyle=hg;ctx.shadowColor=uni.hornGlow;ctx.shadowBlur=10;ctx.fill();ctx.restore();

  ctx.beginPath();ctx.arc(29,-15,4,0,Math.PI*2);ctx.fillStyle='#1e1b4b';ctx.fill();
  ctx.beginPath();ctx.arc(30,-16,1.5,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();

  ctx.beginPath();ctx.moveTo(20,-22);ctx.lineTo(17,-30);ctx.lineTo(24,-24);ctx.closePath();ctx.fillStyle=uni.body[1];ctx.fill();

  for(let i=0;i<6;i++){
    ctx.beginPath();ctx.arc(18-i*2.5,-18+Math.sin(i*1.2+frame*0.05)*3,4-i*0.3,0,Math.PI*2);
    ctx.fillStyle=uni.mane[i%uni.mane.length];ctx.globalAlpha=0.85;ctx.fill();ctx.globalAlpha=1;
  }

  if(!UNI.grounded||Math.abs(UNI.vy)>1){
    ctx.save();ctx.translate(-4,0);ctx.rotate(Math.sin(frame*0.18)*0.4);
    ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(-20,-25,-35,-10);ctx.quadraticCurveTo(-15,5,0,0);
    ctx.fillStyle=uni.wing;ctx.fill();ctx.strokeStyle=uni.wingStroke;ctx.lineWidth=1;ctx.stroke();ctx.restore();
  }

  const tw=Math.sin(t*0.8);
  ctx.beginPath();ctx.moveTo(-24,4);ctx.quadraticCurveTo(-38+tw*5,-5,-45,8+tw*8);ctx.strokeStyle=uni.tail[0];ctx.lineWidth=6;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.moveTo(-24,4);ctx.quadraticCurveTo(-36+tw*5,0,-44,14+tw*8);ctx.strokeStyle=uni.tail[1];ctx.lineWidth=4;ctx.stroke();

  ctx.restore();

  UNI.sparkles.forEach(s=>{
    ctx.save();ctx.globalAlpha=s.life;ctx.beginPath();ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
    ctx.fillStyle=`hsl(${s.hue},100%,75%)`;ctx.shadowColor=`hsl(${s.hue},100%,75%)`;ctx.shadowBlur=8;ctx.fill();ctx.restore();
  });
}

function drawObstacle(obs){
  ctx.save();
  const grad=ctx.createLinearGradient(obs.x,obs.y,obs.x+obs.w,obs.y+obs.h);
  grad.addColorStop(0,obs.color);grad.addColorStop(1,shade(obs.color,-40));
  ctx.fillStyle=grad;ctx.shadowColor=obs.color;ctx.shadowBlur=15;
  ctx.beginPath();ctx.moveTo(obs.x+obs.w/2,obs.y);ctx.lineTo(obs.x+obs.w,obs.y+obs.h*0.3);
  ctx.lineTo(obs.x+obs.w,obs.y+obs.h);ctx.lineTo(obs.x,obs.y+obs.h);ctx.lineTo(obs.x,obs.y+obs.h*0.3);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.28)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.moveTo(obs.x+5,obs.y+obs.h*0.3);ctx.lineTo(obs.x+obs.w*0.4,obs.y+obs.h*0.3);
  ctx.lineTo(obs.x+obs.w*0.3,obs.y+obs.h*0.6);ctx.lineTo(obs.x+5,obs.y+obs.h*0.6);
  ctx.fillStyle='rgba(255,255,255,0.11)';ctx.fill();ctx.restore();
}

function shade(hex,amt){
  const n=parseInt(hex.replace('#',''),16);
  return `rgb(${Math.max(0,Math.min(255,(n>>16)+amt))},${Math.max(0,Math.min(255,((n>>8)&0xff)+amt))},${Math.max(0,Math.min(255,(n&0xff)+amt))})`;
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.save();ctx.globalAlpha=p.life;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
    ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=10;ctx.fill();ctx.restore();
  });
}

function render(){
  ctx.clearRect(0,0,W,H);
  drawBg();drawTrail();obstacles.forEach(drawObstacle);
  drawMainUnicorn();drawParticles();
  if(gameState==='playing'){
    ctx.save();ctx.fillStyle='rgba(255,255,255,0.14)';ctx.font='700 12px Nunito';
    ctx.fillText(`SPEED ×${speed.toFixed(1)}`,W-110,H-10);ctx.restore();
  }
}

function loop(){update();render();requestAnimationFrame(loop);}

// ── OVERLAYS ─────────────────────────────────────────────────────
function showOnly(id){document.querySelectorAll('.overlay').forEach(o=>o.classList.toggle('hidden',o.id!==id));}
function hideAll(){document.querySelectorAll('.overlay').forEach(o=>o.classList.add('hidden'));}

function showGameOver(){
  setTimeout(()=>{
    document.getElementById('goSubtext').textContent=score>=best&&score>0?'✨ New Best Score!':'Keep practising!';
    document.getElementById('finalScore').textContent=`Score: ${score}  •  Best: ${best}`;
    showOnly('gameoverOverlay');
  },600);
}

document.getElementById('chooseBtn').addEventListener('click',()=>{buildSelectGrid();showOnly('selectOverlay');});
document.getElementById('startBtn').addEventListener('click',()=>{previewCanvases=[];init();gameState='playing';hideAll();});
document.getElementById('replayBtn').addEventListener('click',()=>{init();gameState='playing';hideAll();});
document.getElementById('changeBtn').addEventListener('click',()=>{buildSelectGrid();showOnly('selectOverlay');});

// ── INPUT ────────────────────────────────────────────────────────
// Keyboard
document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();jump();}});

// Tap/click on canvas
canvas.addEventListener('pointerdown',e=>{e.preventDefault();jump();},{passive:false});

// On-screen jump button (mobile)
document.getElementById('jumpBtn').addEventListener('pointerdown',e=>{e.stopPropagation();e.preventDefault();jump();},{passive:false});

// Prevent context menu & scroll on mobile
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
document.addEventListener('contextmenu',e=>e.preventDefault());

init();loop();
</script>
</body>
